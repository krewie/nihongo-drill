<!doctype html>
<html style="height:100%; background:#000000;">
<head>
    <style>
        a {
            color: #ff0000;
            text-decoration: underline;
            text-decoration-color: #800000;
            text-decoration-thickness: 0.1px;
            text-underline-offset: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 1.2em 0 0.2em;
            margin-bottom: 0.1em;
        }

        .banner-wrap {
            position: relative;
            width: fit-content;
            margin: 0 auto;
        }

        .banner {
            display: block;
            width: 100%;
            height: auto;
        }

        .banner-title {
            position: absolute;

            /* steer position here */
            top: 65%;
            left: 50%;
            transform: translateX(-100%);

            color: #ff0000;
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 0.08em;
            margin: 0;

            text-shadow:
                0 0 6px rgba(255, 255, 255, 0.6),
                0 0 10px rgba(255, 0, 0, 0.4);
        }

        .banner-subtitle {
            position: absolute;

            /* steer position here */
            top: 88%;
            left: 50%;
            transform: translateX(-100%);

            color: #ff0000;
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 0.08em;
            margin: 0;

            text-shadow:
                0 0 6px rgba(255, 255, 255, 0.6),
                0 0 10px rgba(255, 0, 0, 0.4);
        }

        .banner-title .small {
            font-weight: 300;
        }

        a:hover,
        a:active {
            color: #FFFFFF;
        }

        .table-text {
            color: #ff0000;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 1.2em 0 0.2em;
            margin-bottom: 0.1em;
        }

        td {
            color: #ffffff;
            padding: 1em 2em;
        }

        ruby {
            ruby-position: over;
        }

        .header1 {
            text-align: center;
            color: #ff0000;
            font-size: 2rem;      /* font size 6 */
            font-weight: bold; /* <em> default */
            font-style: bold;  /* because you used <em> */
            margin: 0.6em 0 0.2em;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
        }

        .header1 .small {
            font-weight: 300;
        }

        .header2 {
            text-align: center;
            color: #ffffff;
            font-size: 1.5rem;   /* font size 5 */
            margin: 0 0 1em;
        }

        hr {
            border: none;
            border-top: 1px solid #ff0000;
            margin: 2em 15%;
            opacity: 0.8;
        }

rt {
  font-size: 0.5em;
  opacity: 0.85;
}


</style>

</head>
<body style="margin:0; min-height:100%; background:#000000;">

<div class="banner-wrap">
    <img src="../assets/banner.jpg" class="banner" />

    <h1 class="banner-title">
        <span class="small">S</span><span class="small">I</span>LENT HI<span class="small">L</span><span class="small">L</span>
    </h1>
    <p class="banner-subtitle header2">サイレント・ヒル　全てのメモ</p>
</div>
<hr/>

<div align="center">
<table border="0">
    <tbody>
        <tr>
            <p class="table-text">オリギナル・シェリー</p>
        </tr>
        <tr>
            <td align="center" colspan="2">
                <p class="table-text">サイレント・ヒル 1</p>
                <a href="MEMO">メモ</a>
            </td>
            <td align="center" colspan="2">
                <p class="table-text">サイレント・ヒル 2</p>
                <a href="../pages/sh2/memo.html">メモ</a>

            </td>
            <td align="center" colspan="2">
                <p class="table-text">サイレント・ヒル 3</p>
                <a href="MEMO">メモ</a>

            </td>
        </tr>
    </tbody>
</table>
</div>

</body>
</html>
