<!doctype html>
<html style="height:100%; background:#000000;">
<head>
    <style>
        body {
            margin: 0;
            min-height: 100%;
            background: #000000;
        }

        .banner-wrap {
            position: relative;
            width: fit-content;
            margin: 0 auto;
        }

        .banner {
            display: block;
            width: 100%;
            height: auto;
        }

        .memo-overlay {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translate(-50%, -50%);

            display: grid;
            gap: 0.4rem;

            color: #9393c3;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 0.08em;

            text-shadow:
                0 0 3px rgba(80, 75, 130, 0.8),
                0 0 6px rgba(30, 25, 70, 0.9);
        }

        .memo-row {
            display: grid;
            grid-template-columns: auto auto;
            gap: 2rem;
            align-items: center;

            white-space: nowrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.45);
            padding-bottom: 0.2rem;
        }

        .memo-row a {
            color: inherit;
            text-decoration: none;
            font: inherit;
            letter-spacing: inherit;
        }

        .darken-img {
            filter: brightness(50%);
        }
    </style>
</head>

<body>
    <div class="banner-wrap">
        <img class="darken-img" src="../../assets/memoindex.jpg" class="banner" />

        <div class="memo-overlay">
            <div class="memo-row">
                <a href="">サイレント・ヒル</a>
            </div>

            <div class="memo-row">
                <span>メモ一覧</span>
            </div>

            <div class="memo-row">
                <span>資料</span>
            </div>
        </div>
    </div>
</body>
</html>
